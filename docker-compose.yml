version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: ml_backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENV=development
      - ALLOWED_ORIGINS=http://localhost:5173,http://127.0.0.1:5173
    volumes:
      - .:/app
    command: uvicorn ml_backend.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./coincast-pulse
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./coincast-pulse:/app
      - /app/node_modules
