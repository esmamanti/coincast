services:
  backend:
    build:
      context: .
      dockerfile: ml_backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENV=development
      - ALLOWED_ORIGINS=http://localhost:5173,http://127.0.0.1:5173
    volumes:
      - .:/app
    command: uvicorn ml_backend.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./coincast-pulse
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./coincast-pulse:/app
      - /app/node_modules

  paper-trader:
    profiles: ["paper"]
    build:
      context: .
      dockerfile: ml_backend/Dockerfile
    environment:
      - PAPER_TRADING_ENABLED=true
      - PAPER_DB_PATH=/app/data/paper_trading.sqlite3
    env_file:
      - path: .env
        required: false
    volumes:
      - .:/app
    command: python -m src.run_paper_trader --symbols BTCUSDT ETHUSDT --horizon 1 --every-seconds 3600

  forecast-tracker:
    profiles: ["paper"]
    build:
      context: .
      dockerfile: ml_backend/Dockerfile
    environment:
      - PREDICTION_DB_PATH=/app/data/prediction_tracking.sqlite3
    volumes:
      - .:/app
    command: python -m src.run_forecast_tracker --every-seconds 3600
